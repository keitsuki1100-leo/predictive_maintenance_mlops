name: Predictive Maintenance MLOps Pipeline
# Triggering test run for validation


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy fastapi uvicorn

      - name: Generate sensor data
        run: |
          python src/generate_sensor_data.py

      - name: Train model
        run: |
          python src/train_model.py

      - name: Evaluate and register model
        run: |
          python src/evaluate_and_register.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: predictive-maintenance-model
          path: mlruns/